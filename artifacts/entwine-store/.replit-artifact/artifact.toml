kind = "web"
previewPath = "/"
title = "Entwine Store"
version = "1.0.0"
id = "artifacts/entwine-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26235

[services.development]
run = "pnpm --filter @workspace/entwine-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/entwine-store", "run", "build" ]
publicDir = "artifacts/entwine-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26235"
BASE_PATH = "/"
